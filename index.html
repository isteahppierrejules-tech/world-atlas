<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Atlas - Interactif</title>
    <!-- Nou itilize yon chemen relatif ki pi an sekirite pou GitHub Pages -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">🌐 World Atlas</div>
            <nav class="nav-links">
                <a href="#">Home</a>
                <a href="#" class="active">Countries</a>
                <a href="#">Regions</a>
                <a href="#">Map</a>
                <a href="#">About</a>
            </nav>
            <form id="search-form" class="search-bar-form" novalidate>
                <div class="search-box">
                    <input type="text" id="country-input" placeholder="Search countries..." autocomplete="off">
                    <button type="submit" class="search-btn">🔍</button>
                </div>
            </form>
        </div>
    </header>

    <main class="app-container">
        <!-- Mesaj erè aksesibilite -->
        <p id="error-message" class="error-msg" role="alert"></p>

        <!-- Seksyon Chajman (Spinner) -->
        <div id="loading-spinner" class="spinner hidden">
            <div class="loader"></div>
            <p>Chargement des données...</p>
        </div>

        <!-- Kat la ap kòmanse kache, l ap parèt sèlman lè gen rechèch -->
        <section id="result-section" class="result-section hidden">
            <div class="back-link">&larr; Back to Americas</div>
            
            <div class="card">
                <div class="flag-container">
                    <img id="country-flag" src="" alt="">
                </div>
                
                <div class="info-container">
                    <h1 id="country-name">Haiti</h1>
                    
                    <div class="info-row">
    <span id="sub-capital" class="info-value"></span>
</div>
                    <div class="info-row">
                        <span class="info-label">📍 Capital:</span>
                        <span id="sub-capital" class="info-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">👥 Population:</span>
                        <span id="country-population" class="info-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">🌍 Region:</span>
                        <span id="country-region" class="info-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">💵 Currency:</span>
                        <span id="country-currency" class="info-value"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">💬 Languages:</span>
                        <span id="country-languages" class="info-value"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 ISTEAH - Cours LOG3500 - Jerome Elie</p>
    </footer>

    <!-- Script la sipoze rele yon sèl fwa isit la, byen pwòp -->
    <script src="js/app.js"></script>
</body>
</html>
